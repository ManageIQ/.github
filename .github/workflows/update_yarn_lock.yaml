name: Update yarn.lock
on:
  workflow_call:
    inputs:
      pr_repository:
        description: The repository to which the PR branch should be pushed
        required: true
        type: string
    secrets:
      pr_token:
        required: true
permissions:
  contents: read
jobs:
  update-yarn-lock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up system
      run: bin/before_install
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: package.json
        cache: yarn
        registry-url: https://npm.manageiq.org/
    - name: Update yarn.lock
      env:
        YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
      run: |
        rm -f yarn.lock
        yarn install --mode update-lockfile
        echo "::group::yarn.lock changes"
        git --no-pager diff -- yarn.lock
        echo "::endgroup::"
    - name: Detect Jest availability
      id: detect-jest
      run: |
        if grep -q '"jest"' package.json; then
          echo "has_jest=true" >> $GITHUB_OUTPUT
          echo "Jest found in package.json"
        else
          echo "has_jest=false" >> $GITHUB_OUTPUT
          echo "Jest not found in package.json"
        fi
    - name: Update Jest snapshots
      if: steps.detect-jest.outputs.has_jest == 'true'
      env:
        CYPRESS_INSTALL_BINARY: 0
      run: |
        echo "Jest test script found, updating snapshots..."
        yarn install
        echo "::group::Snapshot update"
        yarn jest -u || echo "No tests to update or tests failed"
        echo "::endgroup::"
        echo "::group::Snapshot changes"
        git --no-pager diff -- . ":(exclude)yarn.lock"
        echo "::endgroup::"
    - name: Build add-paths list
      id: build-paths
      run: |
        echo "paths<<EOF" >> $GITHUB_OUTPUT
        echo 'yarn.lock' >> $GITHUB_OUTPUT
        [ "${{ steps.detect-jest.outputs.has_jest }}" == "true" ] && echo '**/*.snap' >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        add-paths: ${{ steps.build-paths.outputs.paths }}
        push-to-fork: "${{ inputs.pr_repository }}"
        token: "${{ secrets.pr_token }}"
        branch: update_yarn_lock
        delete-branch: true
        author: ManageIQ Bot <bot@manageiq.org>
        committer: ManageIQ Bot <bot@manageiq.org>
        commit-message: Update yarn.lock with latest dependencies
        title: Update yarn.lock with latest dependencies
        body: |
          Update yarn.lock with latest dependencies
        labels: dependencies
        team-reviewers: ManageIQ/committers-ui
        assignees: GilbertCherrie
