name: Update yarn.lock
on:
  workflow_call:
    inputs:
      pr_repository:
        description: The repository to which the PR branch should be pushed
        required: true
        type: string
    secrets:
      pr_token:
        required: true
permissions:
  contents: read
jobs:
  update-yarn-lock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up system
      run: bin/before_install
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version-file: package.json
        cache: yarn
        registry-url: https://npm.manageiq.org/
    - name: Update yarn.lock
      env:
        YARN_ENABLE_IMMUTABLE_INSTALLS: 'false'
      run: |
        rm -f yarn.lock
        yarn install --mode update-lockfile
        git --no-pager diff
    - name: Update Jest snapshots
      run: |
        if grep -q '"jest"' package.json; then
          echo "Jest test script found, updating snapshots..."
          yarn install
          yarn jest -u || echo "No tests to update or tests failed"
          git --no-pager diff
        else
          echo "No Jest test script found, skipping snapshot update"
        fi
    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        add-paths: |
          yarn.lock
          **/*.snap
        push-to-fork: "${{ inputs.pr_repository }}"
        token: "${{ secrets.pr_token }}"
        branch: update_yarn_lock
        delete-branch: true
        author: ManageIQ Bot <bot@manageiq.org>
        committer: ManageIQ Bot <bot@manageiq.org>
        commit-message: Update yarn.lock with latest dependencies
        title: Update yarn.lock with latest dependencies
        body: |
          Update yarn.lock with latest dependencies
        labels: dependencies
        team-reviewers: ManageIQ/committers-ui
        assignees: GilbertCherrie
